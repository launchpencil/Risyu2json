name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "PKG_NAME=$PKG_NAME" >> "$GITHUB_ENV"
          echo "PKG_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Verify npm token exists
        run: test -n "$NODE_AUTH_TOKEN" || (echo "NPM_TOKEN is not set" && exit 1)

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Verify npm authentication
        run: npm whoami

      - name: Verify version is not already published
        run: |
          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "$PKG_NAME@$PKG_VERSION is already published"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Verify dist exists
        run: test -f dist/extract.js || (echo "dist/extract.js not found" && exit 1)

      - name: Publish
        run: npm publish --access public
